<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Professional Resume Builder</title>

<link rel="stylesheet" href="style.css">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#f4f4f4;
padding:20px;
}

.container{
max-width:1000px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h1{
text-align:center;
margin-bottom:20px;
}

.form-section{
display:flex;
flex-direction:column;
gap:10px;
}

input, textarea{
padding:12px;
border:1px solid #ccc;
border-radius:5px;
font-size:16px;
}

textarea{
height:100px;
}

button{
padding:12px;
background:#007bff;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#0056b3;
}

.resume{
margin-top:30px;
padding:20px;
border:2px solid #ddd;
border-radius:10px;
background:#fafafa;
}

.resume h2{
color:#007bff;
margin-bottom:10px;
}

.footer{
margin-top:30px;
text-align:center;
}

.footer button{
background:green;
margin-top:10px;
}
</style>

</head>
<body>

<div class="container">

<h1>Professional Resume Builder</h1>

<div class="form-section">

<input type="text" id="name" placeholder="Full Name">

<input type="email" id="email" placeholder="Email Address">

<input type="text" id="phone" placeholder="Phone Number">

<textarea id="skills" placeholder="Skills"></textarea>

<textarea id="education" placeholder="Education"></textarea>

<textarea id="experience" placeholder="Experience"></textarea>

<button onclick="generateResume()">
Generate Resume
</button>

</div>

<div class="resume" id="resume">

<h2>Your Resume Will Appear Here</h2>

</div>

<div class="footer">

<p><strong>P. Muthis</strong></p>

<p>Email: YOUR_REAL_EMAIL@gmail.com</p>

<a href="https://digitalheroesco.com" target="_blank">
<button>
Built for Digital Heroes
</button>
</a>

</div>

</div>

<script>

function generateResume(){

let name=document.getElementById("name").value;
let email=document.getElementById("email").value;
let phone=document.getElementById("phone").value;
let skills=document.getElementById("skills").value;
let education=document.getElementById("education").value;
let experience=document.getElementById("experience").value;

document.getElementById("resume").innerHTML=`

<h2>${name}</h2>

<p><strong>Email:</strong> ${email}</p>

<p><strong>Phone:</strong> ${phone}</p>

<hr>

<h3>Skills</h3>
<p>${skills}</p>

<h3>Education</h3>
<p>${education}</p>

<h3>Experience</h3>
<p>${experience}</p>

`;

}

</script>

</body>
</html>
