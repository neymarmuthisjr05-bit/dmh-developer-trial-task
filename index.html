<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Professional Resume Builder</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Professional Resume Builder</h1>

    <div class="form-section">

        <input type="text" id="name" placeholder="Full Name">

        <input type="email" id="email" placeholder="Email Address">

        <input type="text" id="phone" placeholder="Phone Number">

        <textarea id="skills" placeholder="Skills"></textarea>

        <textarea id="education" placeholder="Education"></textarea>

        <textarea id="experience" placeholder="Experience"></textarea>

        <button onclick="generateResume()">
            Generate Resume
        </button>

    </div>

    <div class="resume" id="resume">

        <h2>Resume Preview</h2>

        <p>Fill the form and click Generate Resume.</p>

    </div>

    <div class="footer">

        <p><strong>P. Muthis</strong></p>

        <p>Email: neymarmuthisjr05@gmail.com</p>

        <a href="https://digitalheroesco.com" target="_blank">
            <button>
                Built for Digital Heroes
            </button>
        </a>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
